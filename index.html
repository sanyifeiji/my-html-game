<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反转重力</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400&display=swap');
  :root{--neon:#00ffe7;--hot:#ff2d6b;--bg:#050a0f;--grid:#0d1f2d;--text:#c8f0ff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px;opacity:0.4;z-index:0}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 40%,var(--bg) 100%);z-index:0}
  .container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px}
  h1{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;letter-spacing:.15em;color:var(--neon);text-shadow:0 0 20px var(--neon),0 0 60px rgba(0,255,231,.3);text-align:center}
  .subtitle{font-size:.78rem;letter-spacing:.2em;color:var(--hot);text-shadow:0 0 10px var(--hot);text-transform:uppercase}
  .hud{display:flex;gap:28px;font-family:'Orbitron',monospace}
  .hud-item{display:flex;flex-direction:column;align-items:center;gap:2px}
  .hud-label{font-size:.6rem;letter-spacing:.2em;color:rgba(200,240,255,.5)}
  .hud-val{color:var(--neon);font-weight:700;text-shadow:0 0 8px var(--neon);font-size:.85rem}
  canvas{border:1px solid rgba(0,255,231,.2);box-shadow:0 0 30px rgba(0,255,231,.1);display:block;background:rgba(5,10,15,.9)}
  .controls{display:flex;gap:12px;align-items:center;font-size:.72rem;color:rgba(200,240,255,.5);letter-spacing:.1em}
  .key{display:inline-block;padding:3px 10px;border:1px solid rgba(0,255,231,.3);border-radius:4px;color:var(--neon);font-family:'Orbitron',monospace;font-size:.65rem;background:rgba(0,255,231,.05)}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,10,15,.92);z-index:10;gap:8px;backdrop-filter:blur(4px);padding:20px}
  #overlay h2{font-family:'Orbitron',monospace;font-size:clamp(1.1rem,3vw,1.7rem);color:var(--hot);text-shadow:0 0 20px var(--hot);text-align:center}
  #overlay p{font-size:.72rem;color:rgba(200,240,255,.65);text-align:center;line-height:2;max-width:380px}
  #overlay button{margin-top:8px;padding:10px 32px;background:transparent;border:2px solid var(--neon);color:var(--neon);font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;letter-spacing:.15em;cursor:pointer;text-shadow:0 0 8px var(--neon);box-shadow:0 0 20px rgba(0,255,231,.2);transition:all .2s}
  #overlay button:hover{background:rgba(0,255,231,.1);box-shadow:0 0 40px rgba(0,255,231,.4)}
  .level-badge{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--hot);background:rgba(255,45,107,.1);border:1px solid rgba(255,45,107,.3);padding:3px 12px;border-radius:2px}
  .wrap{position:relative}
</style>
</head>
<body>
<div class="container">
  <h1>反转重力</h1>
  <div class="subtitle">GRAVITY FLIP · 挑战重力极限</div>
  <div class="hud">
    <div class="hud-item"><span class="hud-label">关卡</span><span class="hud-val" id="lvlDisplay">01</span></div>
    <div class="hud-item"><span class="hud-label">死亡</span><span class="hud-val" id="deathDisplay">00</span></div>
    <div class="hud-item"><span class="hud-label">逆转</span><span class="hud-val" id="flipDisplay">0</span></div>
  </div>
  <div class="wrap">
    <canvas id="c" width="520" height="360"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">反转重力</h2>
      <div class="level-badge" id="overlaySub">GRAVITY FLIP</div>
      <p id="overlayDesc">
        按 <b style="color:var(--neon)">空格</b> 逆转重力，到达 <b style="color:#ffe700">金色终点</b>，触碰红刺即死<br>
        <span style="color:#ff8c00">⚡加速</span> &nbsp;
        <span style="color:#00aaff">🛡护盾</span> &nbsp;
        <span style="color:#cc44ff">🔒重力锁</span> &nbsp;
        <span style="color:#44ff88">↕弹射</span><br>
        <span style="color:#aaaaff">👻幽灵</span> &nbsp;
        <span style="color:#ff44aa">🧲磁力</span> &nbsp;
        <span style="color:#00ffaa">⏱慢时间</span> &nbsp;

        <span style="color:#ff6688">🪞镜像</span> &nbsp;
        <span style="color:#ffcc44">◈缩小</span> &nbsp;
        <span style="color:#ff5500">💣引力炸弹</span>
      </p>
      <button id="startBtn" onclick="startGame()">开始游戏</button>
    </div>
  </div>
  <div class="controls">
    <span><span class="key">←</span><span class="key">→</span> 移动</span>
    <span><span class="key">SPACE</span> 逆转重力</span>
    <span><span class="key">R</span> 重来</span>
  </div>
</div>

let doubleFlipCharge=0;
// 炸弹待爆
let bombPending=false,bombTimer=0;
// toast
let toastMsg='',toastTimer=0;
// 时钟
let t=0;

function parseLevelMap(lv){
  const tiles=[];
  for(let r=0;r<ROWS;r++){
    tiles[r]=[];
    const row=lv.map[r]||'';
    for(let c=0;c<COLS;c++) tiles[r][c]=parseInt(row[c]||'0');
  }
  return tiles;
}

function generateItems(lv){
  const result=[];
  const occ=new Set([`${lv.start.x},${lv.start.y}`,`${lv.goal.x},${lv.goal.y}`]);
  for(const sp of lv.spikes) occ.add(`${sp.c},${sp.r}`);
  const free=[];
  for(let r=1;r<ROWS-1;r++)
    for(let c=1;c<COLS-1;c++)
      if(mapData[r][c]===0&&!occ.has(`${c},${r}`)) free.push({c,r});
  const count=Math.min(4+Math.floor(level/3),7);
  const shuffled=free.sort(()=>Math.random()-.5);
  for(let i=0;i<Math.min(count,shuffled.length);i++){
    const cell=shuffled[i];
    result.push({c:cell.c,r:cell.r,type:ITEM_KEYS[i%ITEM_KEYS.length],collected:false,bob:Math.random()*Math.PI*2});
  }
  return result;
}

function initLevel(){
  const lv=LEVELS[level];
  mapData=parseLevelMap(lv);
  spikeData=lv.spikes;
  const s=lv.start;
  player={x:s.x*TILE+4,y:s.y*TILE,w:TILE-8,h:TILE-8,vx:0,vy:0,trail:[],flipAnim:0};
  gravDir=1;particles=[];items=generateItems(lv);
  bBoost=bShield=bGravlock=bGhost=bMagnet=bTimeslow=bFreeze=bMirror=bMinisize=0;
  doubleFlipCharge=0;bombPending=false;bombTimer=0;
  totalFlips=0;toastMsg='';toastTimer=0;
  updateHUD();
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  gameRunning=true;level=0;deaths=0;initLevel();loop();
}

function nextLevel(){
  level++;
  if(level>=LEVELS.length){
    showOverlay('🎉 全部通关！',`死亡 ${deaths} 次 · 逆转 ${totalFlips} 次`,'你已征服所有关卡！','再玩一次',()=>{
      level=0;deaths=0;initLevel();
      document.getElementById('overlay').style.display='none';
    });return;
  }
  initLevel();
}

function die(){
  deaths++;
  spawnParticlesBurst(player.x+player.w/2,player.y+player.h/2,'#ff2d6b',20);
  initLevel();updateHUD();
}

function showOverlay(title,sub,desc,btn,cb){
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('overlaySub').textContent=sub;
  document.getElementById('overlayDesc').innerHTML=desc;
  document.getElementById('startBtn').textContent=btn;
  document.getElementById('startBtn').onclick=cb;
  document.getElementById('overlay').style.display='flex';
}

function updateHUD(){
  document.getElementById('lvlDisplay').textContent=String(level+1).padStart(2,'0');
  document.getElementById('deathDisplay').textContent=String(deaths).padStart(2,'0');
  document.getElementById('flipDisplay').textContent=totalFlips;
}

function toast(msg){toastMsg=msg;toastTimer=90;}

// ===== 输入 =====
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();if(gameRunning)doFlip();}
  if(e.code==='KeyR'&&gameRunning){deaths++;initLevel();updateHUD();}
});
document.addEventListener('keyup',e=>keys[e.code]=false);

function doFlip(){
  if(bGravlock>0){toast('🔒 重力锁定中！');return;}
  if(doubleFlipCharge>0){
    // 双翻转：连续翻转两次（立即再翻回来后停一帧）
    gravDir*=-1;totalFlips++;
    player.vy=0;player.flipAnim=15;
    spawnParticlesBurst(player.x+player.w/2,player.y+player.h/2,'#ffee00',10);
    setTimeout(()=>{gravDir*=-1;player.vy=0;},120);
    doubleFlipCharge=0;
    toast('✦ 双重反转！');updateHUD();return;
  }
  gravDir*=-1;totalFlips++;
  player.vy=0;player.flipAnim=15;
  spawnParticlesBurst(player.x+player.w/2,player.y+player.h/2,'#00ffe7',12);
  updateHUD();
}

// ===== 物理 =====
const BASE_SPEED=3.5,BASE_GRAV=0.45,MAX_VY=9;

function isSolid(c,r){
  if(r<0||r>=ROWS||c<0||c>=COLS) return true;
  return mapData[r][c]===1;
}
function rectOv(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

function collectItem(item){
  item.collected=true;
  const cx=item.c*TILE+TILE/2,cy=item.r*TILE+TILE/2;
  const def=ITEM_DEFS[item.type];
  spawnParticlesBurst(cx,cy,def.glow,16);
  toast(`${def.label} ${def.name}！`);

  switch(item.type){
    case 'boost':    bBoost=240;break;   // 4秒加速
    case 'shield':   bShield=1;break;    // 1次免死
    case 'gravlock': bGravlock=180;break;// 3秒锁重力
    case 'spring':
      player.vy=-12*gravDir;player.flipAnim=20;
      spawnParticlesBurst(cx,cy,'#44ff88',20);break;
    case 'ghost':    bGhost=180;break;   // 3秒穿墙穿刺
    case 'magnet':   bMagnet=200;break;  // ~3.3秒左右反转
    case 'timeslow': bTimeslow=300;break;// 5秒慢速
    case 'doubleflip': doubleFlipCharge=1;toast('✦ 下次翻转将双重反转！');break;
    case 'freeze':   bFreeze=120;break;  // 2秒无敌穿刺
    case 'mirror':   bMirror=240;break;  // 4秒左右镜像
    case 'minisize': bMinisize=180;break;// 3秒缩小
    case 'bomb':     triggerBomb(cx,cy);break;
  }
}

function triggerBomb(cx,cy){
  bombPending=true;bombTimer=40;
  // 炸弹爆炸：以玩家为圆心炸飞，根据重力给个反向冲击
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*6+3;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:40+Math.random()*20,color:'#ff5500',size:Math.random()*7+2});
  }
  // 给玩家冲击力
  player.vy=-10*gravDir;
  player.vx=(player.x<cx?-1:1)*6;
  toast('💣 引力炸弹！');
}

function update(){
  if(bBoost>0) bBoost--;
  if(bShield>0&&bShield!==1) bShield--;// shield is binary (0 or 1)
  if(bGravlock>0) bGravlock--;
  if(bGhost>0) bGhost--;
  if(bMagnet>0) bMagnet--;
  if(bTimeslow>0) bTimeslow--;
  if(bFreeze>0) bFreeze--;
  if(bMirror>0) bMirror--;
  if(bMinisize>0) bMinisize--;
  if(bombTimer>0) bombTimer--;
  if(toastTimer>0) toastTimer--;

  // 时间减慢：每2帧才真正更新一次物理
  if(bTimeslow>0&&t%2===0) return;

  const spd=bBoost>0?BASE_SPEED*1.85:BASE_SPEED;
  const grav=BASE_GRAV;

  // 镜像操控：左右反转输入
  let moveLeft=keys['ArrowLeft']||keys['KeyA'];
  let moveRight=keys['ArrowRight']||keys['KeyD'];
  if(bMirror>0){[moveLeft,moveRight]=[moveRight,moveLeft];}
  // 磁力枷锁：左右也反转（和mirror叠加抵消也没关系）
  if(bMagnet>0){[moveLeft,moveRight]=[moveRight,moveLeft];}

  player.vx=0;
  if(moveLeft) player.vx=-spd;
  if(moveRight) player.vx=spd;

  // 缩小：玩家缩为正常一半
  const pw=bMinisize>0?Math.floor((TILE-8)*0.5):TILE-8;
  const ph=bMinisize>0?Math.floor((TILE-8)*0.5):TILE-8;
  player.w=pw;player.h=ph;

  player.vy+=grav*gravDir;
  player.vy=Math.max(-MAX_VY,Math.min(MAX_VY,player.vy));

  // 幽灵：跳过墙体碰撞
  if(bGhost>0){
    player.x+=player.vx;
    player.y+=player.vy;
    player.onGround=false;
  } else {
    // X碰撞
    player.x+=player.vx;
    const c1=Math.floor(player.x/TILE),c2=Math.floor((player.x+player.w-1)/TILE);
    const r1=Math.floor(player.y/TILE),r2=Math.floor((player.y+player.h-1)/TILE);
    for(let r=r1;r<=r2;r++){
      if(isSolid(c1,r)&&player.vx<0) player.x=(c1+1)*TILE;
      if(isSolid(c2,r)&&player.vx>0) player.x=c2*TILE-player.w;
    }
    // Y碰撞
    player.y+=player.vy;player.onGround=false;
    const c1b=Math.floor(player.x/TILE),c2b=Math.floor((player.x+player.w-1)/TILE);
    const r1b=Math.floor(player.y/TILE),r2b=Math.floor((player.y+player.h-1)/TILE);
    for(let c=c1b;c<=c2b;c++){
      if(isSolid(c,r1b)&&player.vy<0){player.y=(r1b+1)*TILE;player.vy=0;if(gravDir===-1)player.onGround=true;}
      if(isSolid(c,r2b)&&player.vy>0){player.y=r2b*TILE-player.h;player.vy=0;if(gravDir===1)player.onGround=true;}
    }
  }

  // 道具碰撞
  for(const item of items){
    if(item.collected) continue;
    if(rectOv(player.x,player.y,player.w,player.h,item.c*TILE+6,item.r*TILE+6,TILE-12,TILE-12))
      collectItem(item);
  }

  // 尖刺碰撞（幽灵/冻结时免疫）
  if(bGhost===0&&bFreeze===0){
    for(const sp of spikeData){
      const margin=6;
      if(rectOv(player.x,player.y,player.w,player.h,sp.c*TILE+margin,sp.r*TILE+margin,TILE-margin*2,TILE-margin*2)){
        if(bShield>0){
          bShield=0;player.vy=-5*gravDir;
          spawnParticlesBurst(player.x+player.w/2,player.y+player.h/2,'#00aaff',16);
          toast('🛡 护盾吸收伤害！');
        } else {die();return;}
      }
    }
  }

  // 终点
  const g=LEVELS[level].goal;
  if(rectOv(player.x,player.y,player.w,player.h,g.x*TILE+4,g.y*TILE+4,TILE-8,TILE-8)){levelComplete();return;}

  // 越界死亡（幽灵状态也会死）
  if(player.x<-TILE||player.x>W+TILE||player.y<-TILE||player.y>H+TILE){die();return;}

  // 拖尾
  const trailLife=bBoost>0?22:12;
  player.trail.push({x:player.x+player.w/2,y:player.y+player.h/2,life:trailLife});
  if(player.trail.length>(bBoost>0?28:18)) player.trail.shift();
  player.trail.forEach(tr=>tr.life--);
  player.trail=player.trail.filter(tr=>tr.life>0);
  if(player.flipAnim>0) player.flipAnim--;

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;});
  particles=particles.filter(p=>p.life>0);
}

function levelComplete(){
  gameRunning=false;
  const g=LEVELS[level].goal;
  spawnParticlesBurst(g.x*TILE+TILE/2,g.y*TILE+TILE/2,'#ffe700',30);
  setTimeout(()=>{nextLevel();if(level<LEVELS.length)gameRunning=true;},600);
}

// ===== 粒子 =====
function spawnParticlesBurst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*5+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:25+Math.random()*20,color,size:Math.random()*5+1});
  }
}

// ===== 渲染 =====
function draw(){
  t++;ctx.clearRect(0,0,W,H);

  // 地块
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(mapData[r][c]===1){
        const grd=ctx.createLinearGradient(c*TILE,r*TILE,c*TILE,r*TILE+TILE);
        grd.addColorStop(0,'#1a3a52');grd.addColorStop(1,'#0d1f2d');
        ctx.fillStyle=grd;ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
        ctx.strokeStyle='rgba(0,255,231,0.15)';ctx.lineWidth=1;
        ctx.strokeRect(c*TILE+.5,r*TILE+.5,TILE-1,TILE-1);
        ctx.fillStyle='rgba(0,255,231,0.07)';ctx.fillRect(c*TILE,r*TILE,TILE,2);
      }

  // 尖刺
  for(const sp of spikeData) drawSpike(sp.c*TILE,sp.r*TILE,sp.d);

  // 道具
  for(const item of items) if(!item.collected) drawItem(item);

  // 终点
  const g=LEVELS[level].goal;drawGoal(g.x*TILE,g.y*TILE);

  // 拖尾
  for(let i=0;i<player.trail.length;i++){
    const tr=player.trail[i];
    const trailColor=bBoost>0?'255,140,0':bGhost>0?'170,170,255':'0,255,231';
    ctx.fillStyle=`rgba(${trailColor},${(tr.life/22)*0.35})`;
    const sz=(player.w*0.6)*(i/player.trail.length);
    ctx.fillRect(tr.x-sz/2,tr.y-sz/2,sz,sz);
  }

  // 玩家
  drawPlayer();

  // 粒子
  for(const p of particles){
    ctx.fillStyle=p.color;ctx.globalAlpha=Math.min(p.life/30,1);
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;

  // 炸弹倒计时闪烁圈
  if(bombPending&&bombTimer>0){
    ctx.save();ctx.strokeStyle=`rgba(255,85,0,${bombTimer/40})`;ctx.lineWidth=3;
    ctx.shadowColor='#ff5500';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(player.x+player.w/2,player.y+player.h/2,30+(40-bombTimer),0,Math.PI*2);ctx.stroke();
    ctx.restore();
    if(bombTimer===0) bombPending=false;
  }

  // 重力指示
  drawGravIndicator();
  // Buff条
  drawBuffBar();
  // Toast
  if(toastTimer>0) drawToast();
  // 关卡名
  drawLevelName();
}

function drawSpike(x,y,dir){
  const pulse=0.65+0.35*Math.sin(t*0.09);
  ctx.fillStyle=`rgba(255,45,107,${pulse})`;
  ctx.shadowColor='#ff2d6b';ctx.shadowBlur=10;
  const n=3,sw=TILE/n;
  for(let i=0;i<n;i++){
    ctx.beginPath();
    if(dir==='b'){ctx.moveTo(x+i*sw,y+TILE);ctx.lineTo(x+i*sw+sw/2,y+TILE*0.42);ctx.lineTo(x+i*sw+sw,y+TILE);}
    else{ctx.moveTo(x+i*sw,y);ctx.lineTo(x+i*sw+sw/2,y+TILE*0.58);ctx.lineTo(x+i*sw+sw,y);}
    ctx.closePath();ctx.fill();
  }
  ctx.shadowBlur=0;
}

function drawGoal(x,y){
  const pulse=Math.sin(t*0.06)*0.5+0.5;
  ctx.strokeStyle=`rgba(255,231,0,${0.4+pulse*0.4})`;ctx.lineWidth=2;
  ctx.shadowColor='#ffe700';ctx.shadowBlur=15+pulse*10;
  ctx.strokeRect(x+6,y+6,TILE-12,TILE-12);
  ctx.fillStyle=`rgba(255,231,0,${0.08+pulse*0.08})`;ctx.fillRect(x+6,y+6,TILE-12,TILE-12);
  const cs=6+pulse*3;
  ctx.fillStyle=`rgba(255,231,0,${0.6+pulse*0.4})`;ctx.fillRect(x+TILE/2-cs/2,y+TILE/2-cs/2,cs,cs);
  ctx.shadowBlur=0;
}

function drawItem(item){
  const def=ITEM_DEFS[item.type];
  const x=item.c*TILE,y=item.r*TILE;
  const cx=x+TILE/2,cy=y+TILE/2;
  const bob=Math.sin(t*0.06+item.bob)*4;
  const pulse=Math.sin(t*0.09+item.bob)*0.4+0.6;
  ctx.save();
  ctx.shadowColor=def.glow;ctx.shadowBlur=14+pulse*8;
  // 旋转菱形框
  ctx.save();ctx.translate(cx,cy+bob);ctx.rotate(t*0.025);
  ctx.strokeStyle=def.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.5+pulse*0.3;
  ctx.beginPath();ctx.moveTo(0,-13);ctx.lineTo(13,0);ctx.lineTo(0,13);ctx.lineTo(-13,0);ctx.closePath();ctx.stroke();
  ctx.restore();
  // 内部方块
  ctx.fillStyle=def.color;ctx.globalAlpha=0.88;
  const sz=13;ctx.fillRect(cx-sz/2,cy+bob-sz/2,sz,sz);
  // 图标
  ctx.globalAlpha=1;ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';ctx.shadowBlur=0;ctx.fillText(def.label,cx,cy+bob);
  ctx.restore();
}

function drawPlayer(){
  const px=player.x,py=player.y,pw=player.w,ph=player.h;
  const cx=px+pw/2,cy=py+ph/2;
  const flip=player.flipAnim;
  ctx.save();ctx.translate(cx,cy);
  if(flip>0) ctx.scale(1,1+(flip/15)*0.4*gravDir);
  ctx.translate(-cx,-cy);

  // 幽灵状态：半透明蓝紫
  const isGhost=bGhost>0;
  const isMini=bMinisize>0;
  ctx.globalAlpha=isGhost?0.5:1;
  ctx.shadowColor=isGhost?'#aaaaff':bBoost>0?'#ff8c00':'#00ffe7';
  ctx.shadowBlur=isGhost?20:15+flip*2;

  const grd=ctx.createLinearGradient(px,py,px,py+ph);
  if(isGhost){grd.addColorStop(0,'#aaaaff');grd.addColorStop(1,'#5555aa');}
  else if(bBoost>0){grd.addColorStop(0,'#ffaa00');grd.addColorStop(1,'#ff5500');}
  else if(bFreeze>0){grd.addColorStop(0,'#88ddff');grd.addColorStop(1,'#3399cc');}
  else if(bMirror>0){grd.addColorStop(0,'#ff6688');grd.addColorStop(1,'#cc2244');}
  else{grd.addColorStop(0,'#00ffe7');grd.addColorStop(1,'#0088aa');}

  ctx.fillStyle=grd;ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.strokeRect(px+1,py+1,pw-2,ph-2);

  // 方向箭头
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.shadowBlur=0;
  ctx.beginPath();
  if(gravDir===1){ctx.moveTo(cx,cy+4);ctx.lineTo(cx-4,cy-2);ctx.lineTo(cx+4,cy-2);}
  else{ctx.moveTo(cx,cy-4);ctx.lineTo(cx-4,cy+2);ctx.lineTo(cx+4,cy+2);}
  ctx.closePath();ctx.fill();

  // 镜像图标
  if(bMirror>0){
    ctx.font='8px sans-serif';ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('🪞',cx,py);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();
}

function drawGravIndicator(){
  const x=W-24,y=H/2,len=60;
  ctx.save();
  const lockColor=bGravlock>0?'#cc44ff':'#00ffe7';
  ctx.strokeStyle=`rgba(${bGravlock>0?'204,68,255':'0,255,231'},0.4)`;
  ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y-len/2);ctx.lineTo(x,y+len/2);ctx.stroke();
  const ay=gravDir===1?y+len/2:y-len/2,ady=gravDir;
  ctx.fillStyle=lockColor;ctx.shadowColor=lockColor;ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(x,ay);ctx.lineTo(x-5,ay-ady*10);ctx.lineTo(x+5,ay-ady*10);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  ctx.font='8px Orbitron,monospace';ctx.fillStyle=`rgba(${bGravlock>0?'204,68,255':'0,255,231'},0.55)`;
  ctx.textAlign='center';ctx.fillText(bGravlock>0?'LOCK':'GRAV',x,gravDir===1?y-len/2-6:y+len/2+14);
  ctx.restore();
}

function drawBuffBar(){
  const actives=[];
  if(bBoost>0)    actives.push({type:'boost',   ratio:bBoost/240});
  if(bShield>0)   actives.push({type:'shield',  ratio:1});
  if(bGravlock>0) actives.push({type:'gravlock',ratio:bGravlock/180});
  if(bGhost>0)    actives.push({type:'ghost',   ratio:bGhost/180});
  if(bMagnet>0)   actives.push({type:'magnet',  ratio:bMagnet/200});
  if(bTimeslow>0) actives.push({type:'timeslow',ratio:bTimeslow/300});
  if(bFreeze>0)   actives.push({type:'freeze',  ratio:bFreeze/120});
  if(bMirror>0)   actives.push({type:'mirror',  ratio:bMirror/240});
  if(bMinisize>0) actives.push({type:'minisize',ratio:bMinisize/180});
  if(doubleFlipCharge>0) actives.push({type:'doubleflip',ratio:1});
  if(actives.length===0) return;
  const bw=52,bh=7,gap=4,sx=8,sy=H-22;
  actives.forEach((b,i)=>{
    const def=ITEM_DEFS[b.type],x=sx+i*(bw+gap+18);
    ctx.font='11px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=def.color;ctx.fillText(def.label,x,sy+bh/2);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(x+16,sy,bw,bh);
    ctx.fillStyle=def.color;ctx.shadowColor=def.glow;ctx.shadowBlur=5;
    ctx.fillRect(x+16,sy,bw*b.ratio,bh);ctx.shadowBlur=0;
  });
}

function drawToast(){
  const a=Math.min(toastTimer/20,1);
  ctx.save();ctx.globalAlpha=a;
  ctx.font='bold 14px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';ctx.shadowColor='#00ffe7';ctx.shadowBlur=14;
  ctx.fillText(toastMsg,W/2,28);ctx.restore();
}

function drawLevelName(){
  ctx.save();
  ctx.font='bold 10px Orbitron,monospace';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillStyle='rgba(0,255,231,0.35)';ctx.fillText(`LV.${level+1} ${LEVELS[level].name}`,8,6);
  ctx.restore();
}

// ===== 主循环 =====
function loop(){
  if(gameRunning){update();draw();}
  requestAnimationFrame(loop);
}

initLevel();draw();
</script>
</body>
</html>
